name: 更新台股資料

on:
  schedule:
    # 台北時間週一到週五 18:00(UTC 10:00),收盤後更新
    - cron: '0 10 * * 1-5'
  workflow_dispatch: {}   # 也可以在 GitHub 網頁上手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 抓取證交所資料
        run: node scripts/fetch_stocks.mjs

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json
          git diff --staged --quiet || git commit -m "自動更新台股資料"
          git push
